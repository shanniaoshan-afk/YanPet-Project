name: Build Mac App
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # 升级到 v4

      - name: Set up Python
        uses: actions/setup-python@v5 # 升级到 v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install PyQt5 pyinstaller

      - name: Run PyInstaller
        run: |
          pyinstaller --noconsole --onefile \
          --icon="icon.icns" \
          --name="雁桌宠" \
          --add-data "*.png:." \
          main.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4 # 关键点：升级到 v4
        with:
          name: YanPet-Mac-App
          path: dist/雁桌宠.app
